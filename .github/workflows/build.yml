name: build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: tetherto/oss-actions/node-base@v1
      - run: npm run lint
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: tetherto/oss-actions/node-base@v1
      - run: npm test
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: tetherto/oss-actions/node-base@v1
      - run: npm run build
